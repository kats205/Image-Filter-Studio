<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Filter Studio</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>
    <header>
        <h1>Image Filter Studio</h1>
        <p>Ứng dụng chỉnh sửa ảnh trực tuyến qua API</p>
    </header>

    <main class="container">
        <!-- Section: Upload -->
        <section id="upload-section">
            <div class="upload-box">
                <input type="file" id="imageInput" accept="image/*" hidden>
                <label for="imageInput" class="btn btn-primary">Chọn ảnh từ máy</label>
            </div>
        </section>

        <!-- Section: Preview Before / After -->
        <section id="preview-section" class="hidden">
            <div class="preview-container">
                <div class="preview-item">
                    <h3>Before</h3>
                    <img id="beforeImage" src="" alt="Original Preview">
                </div>
                <div class="preview-item">
                    <h3>After</h3>
                    <img id="afterImage" src="" alt="Filtered Result">
                </div>
            </div>
        </section>

        <!-- Section: Filters & Controls -->
        <section id="controls-section" class="hidden">
            <!-- Filter buttons will be rendered here -->
            <div id="filterList" class="filter-list"></div>
            
            <!-- Intensity Slider -->
            <div id="intensityBox" class="hidden">
                <label for="intensity">Intensity:</label>
                <input type="range" id="intensity" min="0" max="10" value="5">
            </div>

            <button id="downloadBtn" class="btn btn-success hidden">Tải ảnh về</button>
        </section>
    </main>

    <footer>
        <p>© 2026 Image Filter Studio</p>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
