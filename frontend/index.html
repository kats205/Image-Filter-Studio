<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Filter Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex flex-col min-h-screen bg-gray-50 text-gray-800 font-sans">
    <header class="bg-gray-800 text-white text-center p-6 shadow-md">
        <h1 class="text-3xl font-bold mb-2">Image Filter Studio</h1>
        <p class="text-gray-300">Ứng dụng chỉnh sửa ảnh trực tuyến qua API</p>
    </header>

    <main class="w-full max-w-6xl mx-auto px-4 py-8 flex-grow">
        <!-- Section: Upload -->
        <section id="upload-section">
            <div class="text-center p-10 border-2 border-dashed border-gray-300 bg-white rounded-xl shadow-sm mb-8 transition hover:border-blue-400">
                <input type="file" id="imageInput" accept="image/*" class="hidden">
                <label for="imageInput" class="inline-block px-6 py-3 bg-blue-600 text-white font-medium rounded-lg cursor-pointer hover:bg-blue-700 transition">
                    📁 Chọn ảnh từ máy
                </label>
            </div>
        </section>

        <!-- Section: Preview Before / After -->
        <section id="preview-section" class="hidden my-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="text-center bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                    <h3 class="text-lg font-semibold text-gray-600 mb-4">Before</h3>
                    <img id="beforeImage" src="" alt="Original Preview" class="max-w-full h-auto rounded shadow-sm mx-auto">
                </div>
                <div class="text-center bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                    <h3 class="text-lg font-semibold text-blue-600 mb-4">After</h3>
                    <img id="afterImage" src="" alt="Filtered Result" class="max-w-full h-auto rounded shadow-sm mx-auto">
                </div>
            </div>
        </section>

        <!-- Section: Filters & Controls -->
        <section id="controls-section" class="hidden space-y-6">
            <!-- Filter buttons will be rendered here by ui.js -->
            <div id="filterList" class="flex flex-wrap gap-2 justify-center"></div>
            
            <!-- Intensity Slider -->
            <div id="intensityBox" class="hidden max-w-md mx-auto bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <label for="intensity" class="block text-sm font-medium text-gray-700 mb-2">Mức độ (Intensity):</label>
                <input type="range" id="intensity" min="0" max="10" value="5" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
            </div>

            <div class="text-center mt-6">
                <button id="downloadBtn" class="hidden inline-block px-8 py-3 bg-green-600 text-white font-medium rounded-lg shadow-sm hover:bg-green-700 transition">
                    ⬇️ Tải ảnh về
                </button>
            </div>
        </section>
    </main>

    <footer class="bg-gray-800 text-white text-center p-4 mt-auto">
        <p class="text-sm text-gray-400">© 2026 Image Filter Studio</p>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
